<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Administrador de Gastos</title>
    <link rel="stylesheet" href="css/Style.css">
</head>

<body>

    <div class="box">

        <h1>Administrador de Gastos</h1>

        <label>Descripción</label>
        <input type="text" id="descripcion">

        <label>Monto</label>
        <input type="number" id="monto">

        <label>Fecha</label>
        <input type="date" id="fecha">

        <label>Categoría</label>

        <select id="categoria">
            <option value="1">Alimentacion</option>
            <option value="2">Salario</option>
            <option value="3">Transporte</option>
            <option value="4">Servicios</option>
            <option value="5">Arriendo</option>
            <option value="6">Salud</option>
            <option value="7">Educacion</option>
            <option value="8">Entretenimiento</option>
            <option value="9">Otros</option>
        </select>

        <div class="botones">

            <button
                class="sumar"
                id="btnIngreso">
                Ingreso
            </button>

            <button
                class="restar"
                id="btnGasto">
                Gasto
            </button>

        </div>

        <h2>Transacciones</h2>

        <div id="transacciones"></div>

    </div>

    <script src="js/app.js"></script>

</body>
</html>
