<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Gastos</title>
  <link rel="stylesheet" href="frontend/css/Style.css">
</head>
<body>

  <div class="box">
    <h1>Admin Gastos</h1>

    <label>Monto</label>
    <input type="number">

    <label>Fecha</label>
    <input type="date">

    <label>Categoría</label>
    <select>
      <option>Arriendo</option>
      <option>Comida</option>
      <option>Servicios</option>
      <option>Transporte</option>
      <option>Otros</option>
    </select>

  <div class="botones">
            <button class="sumar">Ingreso</button>
            <button class="restar">Gasto</button>
        </div>
          <div class="resumen">
            <h3>Saldo Actual</h3>
            <p class="saldo">$ 0</p>
        </div>

        <h1>Transacciones</h1>
        <div id="transacciones"></div>
        </div>
      </div>

<script src="/frontend/js/app.js"></script>
</body>
</html>
